<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prezzi</title>

    <link rel="stylesheet" href="styles/style.css">
</head>


<body>
    <!--Header della pagina con titolo, paragrafo e prova per il pulsanti sotto annuale/mensile-->
    <header>

    <div class="container-header"> 

        </div class="container-titolo">
            <h1 class="titolo-pagina">
                Our Pricing Plan
            </h1>

            <p class="descrizione-pagina">
             We are an industry-leading company that values honesty, integrity and
             efficiency, building quality products.
            </p>
        </div>

        <div class="pulsanti">

            <span class="mensile">Monthly</span>
            <label class="switch">
                <input class="checkbox">
                <span class="slider"></span>
            </label>

            <span class="annuale">Yearly</span>
             <label class="switch">
                <input class="checkbox">
                <span class="slider"></span>
            </label>

        </div>

    </div>

    </header>
    
</body>
</html>
